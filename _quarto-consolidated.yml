book:
  title: "Campagne 2025 des Observatoires ruraux d'Alaotra et Marovoay"
  subtitle: "Rapport consolidé d'enquêtes"
  output-file: rapport-consolide
  sidebar:
    tools:
      - icon: file-earmark-arrow-down
        menu:
          - text: "Consolidé (PDF)"
            href: rapport-consolide.pdf
          - text: "Consolidé (Word)"
            href: rapport-consolide.docx
          - text: "---"
          - text: "Marovoay (PDF)"
            href: downloads/rapport-marovoay.pdf
          - text: "Marovoay (Word)"
            href: downloads/rapport-marovoay.docx
          - text: "---"
          - text: "Alaotra (PDF)"
            href: downloads/rapport-alaotra.pdf
          - text: "Alaotra (Word)"
            href: downloads/rapport-alaotra.docx

project:
  output-dir: docs

format:
  html:
    theme: cosmo
    code-fold: true
    format-links: false
    css:
      - styles/downloads.css
      - styles/observatory-sections.css
  pdf:
    documentclass: report
    pdf-engine: xelatex
    lang: fr
    toc: true
    echo: false
    include-in-header:
      - text: |
          \usepackage{multirow}
          \usepackage{longtable}
  docx:
    toc: true
    lang: fr
    echo: false
