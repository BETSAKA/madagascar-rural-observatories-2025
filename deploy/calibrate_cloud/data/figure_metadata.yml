# figure_metadata.yml
# Plot type and column mappings for each presentation figure.
# Used by the cloud calibration app to rebuild plots from aggregate XLSX data.
#
# plot_type: make_bar_obs | ror_bar_v | ror_bar_grouped | ror_bar_stacked | custom
# x, y, fill: column names in the XLSX sheet
# params: extra arguments passed to the plot function

# ── 02_structure_menages ─────────────────────────────────────

fig_origine:
  plot_type: ror_bar_grouped
  x: Variable
  "y": pct
  fill: Member_Type
  params:
    direction: horizontal

fig_cm_educ:
  plot_type: make_bar_obs
  x: Type
  "y": pct

fig-cm-act:
  plot_type: make_bar_obs
  x: Act_principal
  "y": Percent
  params:
    y_label: "%"

# ── 04_foncier ───────────────────────────────────────────────

fig-type-exploitee:
  plot_type: make_bar_obs
  x: Type
  "y": pct
  params:
    y_label: "% des parcelles"

# ── 05_agriculture ───────────────────────────────────────────

fig-tenure-riz:
  plot_type: make_bar_obs
  x: Tenure
  "y": pct
  params:
    y_label: "% des parcelles"

fig-production-riz:
  plot_type: custom
  note: "Histogram of r23 (production) — cannot rebuild from aggregate data"

# ── 06_securite_alimentaire ──────────────────────────────────

fig-soudure-vs-stress:
