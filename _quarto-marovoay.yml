book:
  title: "Campagne 2025 de l'Observatoire rural de Marovoay"
  subtitle: "Rapport d'enquête — Observatoire de Marovoay"
  output-file: rapport-marovoay
  chapters:
    - index.qmd
    - 01_description.qmd
    - 02_structure_menages.qmd
    - 03_habitat_niveau_de_vie.qmd
    - 04_foncier.qmd
    - 05_agriculture.qmd
    - 06_securite_alimentaire.qmd
    - 07_rapport_environnement.qmd
    - 08_cataclysme_catastrophe.qmd
    - 09_insertion_projet.qmd
    - 10_enquete_qualite.qmd
    - 12_bibliographie.qmd

project:
  output-dir: docs-marovoay

format:
  pdf:
    documentclass: report
    pdf-engine: xelatex
    lang: fr
    toc: true
    echo: false
    fig-cap-location: top
    geometry:
      - margin=2.2cm
    include-in-header:
      - text: |
          \usepackage{multirow}
          \usepackage{caption}
          \captionsetup{font=small,labelfont=bf}
          \captionsetup[table]{skip=6pt}
          \usepackage{titling}
          \renewcommand{\maketitlehookd}{%
            \vfill
            \begin{center}%
            \includegraphics[width=0.75\textwidth]{images/cover.jpg}\\[4pt]%
            {\small\itshape Rizière dans la région d'Alaotra Mangoro. Photo~: Leja Mitarika / NJProduction,\\ CC~BY-SA~4.0, via Wikimedia Commons.}%
            \end{center}%
            \vfill
          }
  docx:
    toc: true
    lang: fr
    echo: false
    reference-doc: images/Modele_format_rapport.docx
    fig-cap-location: top
